version: "2"
services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /home/joshua/containers/jellyfin/config:/config
      - /home/joshua/containers/jellyfin/data/tvshows:/data/tvshows
      - /home/joshua/containers/jellyfin/data/movies:/data/movies
      - /home/joshua/containers/jellyfin/data/music:/data/music
    ports:
      - 8096:8096
      - 8920:8920 #optional
      - 7359:7359/udp #optional
      - 1900:1900/udp #option
  nextcloud:
    image: lscr.io/linuxserver/nextcloud
    container_name: nextcloud
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /home/joshua/containers/nextcloud/config:/config
      - /home/joshua/containers/nextcloud/data:/data
    ports:
      - 443:443
    restart: unless-stopped
  sickchill:
    image: lscr.io/linuxserver/sickchill
    container_name: sickchill
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /home/joshua/containers/sickchill/config:/config
      - /home/joshua/containers/sickchill/downloads:/downloads
      - /home/joshua/containers/sickchill/tv:/tv
    ports:
      - 8081:8081
    restart: unless-stopped
  transmission:
    image: lscr.io/linuxserver/transmission
    container_name: transmission
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /home/joshua/containers/transmission/config:/config
      - /home/joshua/containers/transmission/downloads:/downloads
      - /home/joshua/containers/transmission/watch:/watch
    ports:
      - 9091:9091
      - 51413:51413
      - 51413:51413/udp
    restart: unless-stopped
